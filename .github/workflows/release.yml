name: Release — Build, Sign & Notarize macOS DMG

# Triggers on version tags: v1.0.0, v1.2.3-beta, etc.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a release build

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Run full test suite before releasing
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Pre-release Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick ghostscript
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' \
            /etc/ImageMagick-6/policy.xml || true
      - run: npm ci
      - run: npx vitest run
        env:
          NODE_ENV: test
          CI: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Build web app
  # ─────────────────────────────────────────────────────────────────────────────
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 1

