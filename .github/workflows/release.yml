  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Create GitHub Release with DMG attached
  # ─────────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-macos-dmg
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # ── Generate changelog from git log ───────────────────────────────────
      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD 2>/dev/null || echo "- Initial release")
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" | head -20)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: ManhattanRIPX-${{ steps.version.outputs.version }}-macOS
          path: release-assets/

      # ── Determine if pre-release ───────────────────────────────────────────
      - name: Check pre-release
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if echo "$TAG" | grep -qE '-(alpha|beta|rc)'; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Manhattan RIP X v${{ steps.version.outputs.version }}"
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: false
          body: |
            ## Manhattan RIP X v${{ steps.version.outputs.version }}

            Professional DTF RIP software for Epson ET-8550 on macOS.

            ### What's New
            ${{ steps.changelog.outputs.changes }}

            ---

            ### Installation
            1. Download `ManhattanRIPX-${{ steps.version.outputs.version }}.dmg`
            2. Open the DMG and drag **Manhattan RIP X** to Applications
            3. On first launch: right-click → Open (if macOS Gatekeeper prompts)

            ### System Requirements
            - macOS 12 Monterey or later (Apple Silicon + Intel universal binary)
            - Epson ET-8550 with DTF ink set installed
            - CUPS/AirPrint for direct printing

            ### Checksums
            ```
            SHA256 checksums available in release assets
            ```
          files: |
            release-assets/*.dmg
            release-assets/*.blockmap
            release-assets/*.yml
          fail_on_unmatched_files: false

      # ── Generate SHA256 checksums ──────────────────────────────────────────
      - name: Attach checksum file
        run: |
          cd release-assets
          sha256sum *.dmg > SHA256SUMS.txt 2>/dev/null || shasum -a 256 *.dmg > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload checksum to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: release-assets/SHA256SUMS.txt
          fail_on_unmatched_files: false
