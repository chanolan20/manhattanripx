name: Release — macOS DMG + Windows EXE

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v2.0.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Tests ────────────────────────────────────────────────────────────────
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick ghostscript
      - run: npm ci
      - run: npx vitest run
        env:
          NODE_ENV: test
          CI: true

  # ── 2. Build web app ────────────────────────────────────────────────────────
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 1

  # ── 3. macOS DMG ────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS DMG (Universal)
    runs-on: macos-14
    needs: build-web
    env:
      APPLE_ID:                    ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
      CSC_LINK:                    ${{ secrets.APPLE_CERTIFICATE }}
      CSC_KEY_PASSWORD:            ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - name: Extract version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Install Electron deps
        working-directory: manhattan-rip-x-electron
        run: npm install
      - name: Set version
        working-directory: manhattan-rip-x-electron
        run: npm pkg set version="${{ steps.version.outputs.version }}"
      - name: Build macOS DMG
        working-directory: manhattan-rip-x-electron
        run: npx electron-builder --mac dmg --publish never
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ManhattanRIPX-${{ steps.version.outputs.version }}-macOS
          path: manhattan-rip-x-electron/release/*.dmg
          retention-days: 90

  # ── 4. Windows EXE ──────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows Installer (x64)
    runs-on: windows-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - name: Extract version
        id: version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Install Electron deps
        working-directory: manhattan-rip-x-electron
        run: npm install
      - name: Set version
        working-directory: manhattan-rip-x-electron
        run: npm pkg set version="${{ steps.version.outputs.version }}"
      - name: Build Windows EXE
        working-directory: manhattan-rip-x-electron
        run: npx electron-builder --win nsis --x64 --publish never
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ManhattanRIPX-${{ steps.version.outputs.version }}-Windows
          path: manhattan-rip-x-electron/release/*.exe
          retention-days: 90

  # ── 5. GitHub Release ───────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Generate changelog
        id: changelog
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -n "$PREV" ]; then
            CHANGES=$(git log --pretty=format:"- %s" "$PREV"..HEAD 2>/dev/null | head -20)
          else
            CHANGES=$(git log --pretty=format:"- %s" | head -20)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: ManhattanRIPX-${{ steps.version.outputs.version }}-macOS
          path: release-assets/
      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: ManhattanRIPX-${{ steps.version.outputs.version }}-Windows
          path: release-assets/
      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt 2>/dev/null || shasum -a 256 * > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Is pre-release?
        id: prerelease
        run: |
          echo "${{ github.ref_name }}" | grep -qE '-(alpha|beta|rc)' \
            && echo "val=true" >> $GITHUB_OUTPUT \
            || echo "val=false" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Manhattan RIP X v${{ steps.version.outputs.version }}"
          prerelease: ${{ steps.prerelease.outputs.val }}
          body: |
            ## Manhattan RIP X v${{ steps.version.outputs.version }}
            Professional DTF RIP software for Epson ET-8550.

            ### Changes
            ${{ steps.changelog.outputs.changes }}

            ### Install
            **macOS:** Download the `.dmg`, open it, drag to Applications.
            **Windows:** Download and run the `.exe` installer.

            > First launch on macOS: right-click → Open if Gatekeeper prompts.
          files: |
            release-assets/*.dmg
            release-assets/*.exe
            release-assets/SHA256SUMS.txt
          fail_on_unmatched_files: false
