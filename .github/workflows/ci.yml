name: CI — Test & Build

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Type-check + Lint
  # ─────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Unit + Integration Tests
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: typecheck

    env:
      NODE_ENV: test
      # Suppress heavy log output during tests
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install system dependencies (ImageMagick for PDF tests)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick ghostscript
          # Allow PDF processing in ImageMagick policy
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' \
            /etc/ImageMagick-6/policy.xml || true

      - name: Install npm dependencies
        run: npm ci

      - name: Run all tests with coverage
        run: npx vitest run --coverage --reporter=verbose
        timeout-minutes: 15

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Coverage summary comment (PR only)
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Build validation
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build client + server
        run: npm run build

      - name: Verify build output exists
        run: |
          test -f dist/public/index.html || (echo "❌ index.html missing" && exit 1)
          test -f dist/index.cjs          || (echo "❌ dist/index.cjs missing" && exit 1)
          echo "✅ Build outputs verified"

      - name: Smoke test — server starts and responds
        run: |
          node dist/index.cjs &
          SERVER_PID=$!
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health)
          kill $SERVER_PID 2>/dev/null || true
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "✅ Server health check passed (HTTP $STATUS)"
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-build
          path: |
            dist/
            !dist/public/assets/
          retention-days: 7
