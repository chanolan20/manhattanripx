name: CI — Test & Build

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: typecheck

    env:
      NODE_ENV: test
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick ghostscript
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' \
            /etc/ImageMagick-6/policy.xml || true

      - name: Install npm dependencies
        run: npm ci

      - name: Run all tests
        run: npx vitest run --reporter=verbose
        timeout-minutes: 15

  build:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build client + server
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/public/index.html || (echo "❌ index.html missing" && exit 1)
          test -f dist/index.cjs          || (echo "❌ dist/index.cjs missing" && exit 1)
          echo "✅ Build outputs verified"

      - name: Smoke test — server starts
        run: |
          node dist/index.cjs &
          SERVER_PID=$!
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health)
          kill $SERVER_PID 2>/dev/null || true
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "✅ Server health check passed"
        env:
          NODE_ENV: production

